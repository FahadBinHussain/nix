name: Nix Auto-Updater to uDrop

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-and-upload:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Restore Memory from Hidden Branch
        shell: bash
        run: |
          git fetch origin bot-memory || true
          git checkout origin/bot-memory -- latest_version.txt || echo "" > latest_version.txt

      - name: Check Store API (Bypass Cloudflare)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $productId = "${{ secrets.PRODUCT_ID }}"
          
          # 1. Define a modern browser User-Agent
          $UserAgent = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/121.0.0.0 Safari/537.36"
          
          Write-Host "Fetching links for Product ID: $productId using Stealth headers..."
          
          # 2. Use curl.exe directly with custom headers to bypass simple bot detection
          $Response = curl.exe -s -X POST "https://store.rg-adguard.net/api/GetFiles" `
            -H "Content-Type: application/x-www-form-urlencoded" `
            -H "User-Agent: $UserAgent" `
            -H "Referer: https://store.rg-adguard.net/" `
            -H "Origin: https://store.rg-adguard.net" `
            --data-binary "type=ProductId&url=$productId&ring=Retail&lang=en-US"

          # Check if we got the "Just a moment" block again
          if ($Response -match "Just a moment" -or $Response -match "cloudflare") {
              Write-Host "Error: Cloudflare is still blocking the request. It requires a JavaScript challenge solver."
              exit 1
          }

          # 3. Extract links from the raw HTML response
          $Links = [regex]::Matches($Response, '<a href="(.*?)".*?>(.*?)<\/a>')
          
          $TargetUrl = ""
          $TargetName = ""
          
          foreach ($Link in $Links) {
              $Url = $Link.Groups[1].Value
              $Filename = $Link.Groups[2].Value
              if ($Filename -match "\.msixbundle$" -or $Filename -match "\.appxbundle$") {
                  $TargetUrl = $Url
                  $TargetName = $Filename
                  break
              }
          }
          
          if ($TargetUrl -eq "") {
             foreach ($Link in $Links) {
                 $Url = $Link.Groups[1].Value
                 $Filename = $Link.Groups[2].Value
                 if (($Filename -match "\.msix$" -or $Filename -match "\.appx$") -and ($Filename -notmatch "\.BlockMap$")) {
                     if ($Filename -match "_x64_" -or $Filename -match "_neutral_") {
                         $TargetUrl = $Url
                         $TargetName = $Filename
                         break
                     }
                 }
             }
          }
          
          if ($TargetUrl -eq "") {
              Write-Host "Error: Could not find valid package links in the API response."
              exit 1
          }

          # Check against memory
          $LatestKnown = (Get-Content "latest_version.txt" -Raw).Trim()
          if ($TargetName -eq $LatestKnown) {
              Write-Host "App is up-to-date ($TargetName). Skipping."
              Add-Content -Path $env:GITHUB_ENV -Value "SKIP_UPLOAD=true"
          } else {
              Write-Host "New version: $TargetName"
              Add-Content -Path $env:GITHUB_ENV -Value "SKIP_UPLOAD=false"
              Add-Content -Path $env:GITHUB_ENV -Value "TARGET_URL=$TargetUrl"
          }
          Add-Content -Path $env:GITHUB_ENV -Value "FILE_NAME=$TargetName"

      - name: Download New Package
        if: env.SKIP_UPLOAD == 'false'
        shell: pwsh
        run: |
          # Use curl -L to follow redirects from Microsoft's CDN
          curl.exe -L -o "$($env:FILE_NAME)" "$($env:TARGET_URL)"

      - name: Upload Package to uDrop
        if: env.SKIP_UPLOAD == 'false'
        shell: pwsh
        run: |
          $AuthBody = @{ key1 = "${{ secrets.UDROP_KEY1 }}"; key2 = "${{ secrets.UDROP_KEY2 }}" }
          $AuthResponse = Invoke-RestMethod -Uri "https://www.udrop.com/api/v2/authorize" -Method Post -Body $AuthBody
          $AccessToken = if ($AuthResponse.access_token) { $AuthResponse.access_token } else { $AuthResponse.response.access_token }
          $AccountId = if ($AuthResponse.account_id) { $AuthResponse.account_id } else { $AuthResponse.response.account_id }

          $Form = @{ access_token = $AccessToken; account_id = $AccountId; upload_file = Get-Item -Path $env:FILE_NAME }
          Invoke-RestMethod -Uri "https://www.udrop.com/api/v2/file/upload" -Method Post -Form $Form
          Write-Host "Upload Complete!"

      - name: Save Memory to Hidden Branch
        if: env.SKIP_UPLOAD == 'false'
        shell: bash
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan bot-memory
          git rm -rf .
          echo "${{ env.FILE_NAME }}" > latest_version.txt
          git add latest_version.txt
          git commit -m "Memory update: ${{ env.FILE_NAME }}"
          git push origin bot-memory --force