name: Nix - Premium MS Store Mirror

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at Midnight UTC
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write

jobs:
  nix-process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Restore Memory from Hidden Branch
        shell: bash
        run: |
          git fetch origin bot-memory || true
          git checkout origin/bot-memory -- latest_version.txt || echo "none" > latest_version.txt
          echo "CURRENT_MEM=$(cat latest_version.txt)" >> $GITHUB_ENV

      - name: Scrape Store Link (Playwright Bypass)
        id: scraper
        env:
          PRODUCT_ID: ${{ secrets.PRODUCT_ID }}
        run: |
          node -e "
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch({ headless: true });
            
            // Correct Playwright way to set User-Agent
            const context = await browser.newContext({
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36'
            });
            
            const page = await context.newPage();
            
            console.log('Navigating to Store API...');
            await page.goto('https://store.rg-adguard.net/', { waitUntil: 'networkidle' });
            
            await page.fill('#url', process.env.PRODUCT_ID);
            await page.selectOption('#ring', 'Retail');
            await page.click('input[type=\"button\"]');
            
            console.log('Waiting for results (Handling Cloudflare)...');
            try {
              // Wait up to 60s for the results table to appear
              await page.waitForSelector('table.table', { timeout: 60000 });
              await page.waitForTimeout(2000); // Small buffer for rendering

              const links = await page.\$\$eval('table.table a', anchors => 
                anchors.map(a => ({ href: a.href, text: a.innerText }))
              );
              
              // Find the best package (Bundle or x64)
              let target = links.find(l => l.text.endsWith('.msixbundle') || l.text.endsWith('.appxbundle'));
              if (!target) {
                target = links.find(l => (l.text.includes('_x64_') || l.text.includes('_neutral_')) && 
                                          (l.text.endsWith('.msix') || l.text.endsWith('.appx')) &&
                                          !l.text.endsWith('.BlockMap'));
              }
              
              if (target) {
                console.log('SUCCESS: Found ' + target.text);
                const fs = require('fs');
                fs.appendFileSync(process.env.GITHUB_ENV, 'FILE_NAME=' + target.text + '\n');
                fs.appendFileSync(process.env.GITHUB_ENV, 'TARGET_URL=' + target.href + '\n');
              } else {
                console.error('FAILED: No valid links found.');
                process.exit(1);
              }
            } catch (e) {
              console.error('CRITICAL ERROR: ' + e.message);
              process.exit(1);
            }
            await browser.close();
          })();
          "

      - name: Version Comparison
        run: |
          STORE_VER="${{ env.FILE_NAME }}"
          MEM_VER="${{ env.CURRENT_MEM }}"
          echo "Comparing Store ($STORE_VER) with Memory ($MEM_VER)"
          
          if [ "$STORE_VER" == "$MEM_VER" ]; then
            echo "SKIP_UPLOAD=true" >> $GITHUB_ENV
            echo "Status: Up to date."
          else
            echo "SKIP_UPLOAD=false" >> $GITHUB_ENV
            echo "Status: New version found."
          fi

      - name: Mirror to uDrop
        if: env.SKIP_UPLOAD == 'false'
        run: |
          echo "Downloading ${{ env.FILE_NAME }}..."
          curl -L -o "${{ env.FILE_NAME }}" "${{ env.TARGET_URL }}"
          
          echo "Authenticating with uDrop..."
          AUTH_RES=$(curl -s -X POST "https://www.udrop.com/api/v2/authorize" \
            -d "key1=${{ secrets.UDROP_KEY1 }}&key2=${{ secrets.UDROP_KEY2 }}")
          
          # Extract tokens via Python for reliability
          TOKEN=$(echo $AUTH_RES | python3 -c "import sys, json; data=json.load(sys.stdin); print(data.get('access_token') or data.get('response', {}).get('access_token', ''))")
          ACC_ID=$(echo $AUTH_RES | python3 -c "import sys, json; data=json.load(sys.stdin); print(data.get('account_id') or data.get('response', {}).get('account_id', ''))")
          
          if [ -z "$TOKEN" ]; then echo "Auth Failed: $AUTH_RES"; exit 1; fi

          echo "Uploading to uDrop (ID: $ACC_ID)..."
          curl -X POST "https://www.udrop.com/api/v2/file/upload" \
            -F "access_token=$TOKEN" \
            -F "account_id=$ACC_ID" \
            -F "upload_file=@${{ env.FILE_NAME }}"

      - name: Update Hidden Memory Branch
        if: env.SKIP_UPLOAD == 'false'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan bot-memory || git checkout bot-memory
          git rm -rf . || true
          echo "${{ env.FILE_NAME }}" > latest_version.txt
          git add latest_version.txt
          git commit -m "Nix Memory Update: ${{ env.FILE_NAME }}"
          git push origin bot-memory --force

      - name: Keep Workflow Alive
        uses: gautamkrishnar/keepalive-workflow@v2