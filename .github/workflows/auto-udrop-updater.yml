name: Nix - Official Mirror

on:
  push:
  workflow_dispatch:

concurrency:
  group: nix-official-mirror-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  nix-sync:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Load Memory from Secret
        shell: bash
        run: |
          if [ -z "${{ secrets.NIX_LAST_VERSION }}" ]; then
            echo "CURRENT_MEM=none" >> $GITHUB_ENV
          else
            echo "CURRENT_MEM=${{ secrets.NIX_LAST_VERSION }}" >> $GITHUB_ENV
          fi

      - name: Fetch App via DanStore API
        shell: powershell
        run: |
          function Get-UdropAuth {
            param(
              [string]$Key1,
              [string]$Key2
            )

            $raw = $null
            try {
              $raw = (Invoke-WebRequest -Uri "https://www.udrop.com/api/v2/authorize" -Method Post -Body @{ key1 = $Key1; key2 = $Key2 } -UseBasicParsing).Content
            } catch {
              return $null
            }

            if (-not $raw) { return $null }

            $json = $null
            try {
              $json = $raw | ConvertFrom-Json
            } catch {
              return $null
            }

            $token = @(
              $json.access_token,
              $json.token,
              $json.data.access_token,
              $json.data.token,
              $json.response.access_token,
              $json.response.token
            ) | Where-Object { $_ } | Select-Object -First 1

            $accountId = @(
              $json.account_id,
              $json.acc_id,
              $json.user_id,
              $json.data.account_id,
              $json.data.acc_id,
              $json.data.user_id,
              $json.response.account_id,
              $json.response.acc_id,
              $json.response.user_id
            ) | Where-Object { $_ } | Select-Object -First 1

            if ($token) { $token = "$token".Trim() }
            if ($accountId) { $accountId = "$accountId".Trim() }

            if ($json._status -ne "success" -or -not $token -or -not $accountId) {
              return $null
            }

            return @{
              token = $token
              account_id = $accountId
            }
          }

          $productId = "${{ secrets.PRODUCT_ID }}"

          if (-not $productId) {
              Write-Host "Error: PRODUCT_ID secret is empty."
              exit 1
          }

          Write-Host "Querying DanStore API for ID: $productId..."
          $apiUrl = "https://danstore-ms.vercel.app/api/packages?id=$productId&type=ProductId&environment=Production"
          $headers = @{
              "User-Agent" = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36"
              "Accept" = "application/json, text/plain, */*"
              "Referer" = "https://danstore-ms.vercel.app/"
              "Origin" = "https://danstore-ms.vercel.app"
          }

          try {
              $resp = Invoke-RestMethod -Uri $apiUrl -Method Get -Headers $headers -TimeoutSec 60
          } catch {
              Write-Host "Error: DanStore API request failed: $($_.Exception.Message)"
              exit 1
          }

          if (-not $resp -or -not $resp.packages -or $resp.packages.Count -eq 0) {
              Write-Host "Error: No packages returned by DanStore API."
              exit 1
          }

          # Prefer bundle packages first, then x64/neutral app packages.
          $priority = @{
              "MSIXBUNDLE" = 1
              "APPXBUNDLE" = 1
              "EMSIXBUNDLE" = 1
              "MSIX" = 2
              "APPX" = 2
          }
          $candidates = @(
              $resp.packages |
              Where-Object {
                  $priority.ContainsKey($_.type) -and
                  ($_.architecture -in @("neutral", "x64", "", $null))
              } |
              Sort-Object `
                  @{ Expression = { if ($priority.ContainsKey($_.type)) { $priority[$_.type] } else { 9 } } }, `
                  @{ Expression = { try { [version]$_.version } catch { [version]"0.0.0.0" } }; Descending = $true }
          )

          if ($candidates.Count -eq 0) {
              Write-Host "Error: No suitable downloadable package candidate found."
              exit 1
          }

          $target = $candidates[0]
          $extMap = @{
              "MSIXBUNDLE" = "msixbundle"
              "APPXBUNDLE" = "appxbundle"
              "EMSIXBUNDLE" = "emsixbundle"
              "MSIX" = "msix"
              "APPX" = "appx"
          }
          $ext = if ($extMap.ContainsKey($target.type)) { $extMap[$target.type] } else { "bin" }
          $fileName = "$($target.fileName).$ext"
          $versionMarker = if ($target.version -and $target.version -ne "Unknown") { $target.version } else { "" }
          $fileMarker = $fileName

          $latestKnown = "${{ env.CURRENT_MEM }}".Trim()
          $knownParts = @()
          if ($latestKnown) {
            $knownParts = $latestKnown.Split("|") | Where-Object { $_ -and $_.Trim().Length -gt 0 } | ForEach-Object { $_.Trim() }
          }
          $alreadyProcessed = ($knownParts -contains $fileMarker) -or (($versionMarker -ne "") -and ($knownParts -contains $versionMarker))

          if ($alreadyProcessed) {
              Write-Host "App is up to date. Skipping."
              Add-Content -Path $env:GITHUB_ENV -Value "SKIP_UPLOAD=true"
              Add-Content -Path $env:GITHUB_ENV -Value "SHOULD_UPDATE_MEMORY=false"
              exit 0
          }

          Write-Host "New package found: $fileName (version: $($target.version))"
          
          # Check uDrop first to avoid duplicate download/upload when file already exists there.
          $k1 = "${{ secrets.UDROP_KEY1 }}"
          $k2 = "${{ secrets.UDROP_KEY2 }}"
          $folderId = "${{ secrets.UDROP_FOLDER_ID }}"
          $udropHasFile = $false

          if (-not $k1 -or -not $k2) {
            Write-Host "Error: UDROP_KEY1/UDROP_KEY2 secrets are missing."
            exit 1
          }

          try {
            $auth = Get-UdropAuth -Key1 $k1 -Key2 $k2
            if (-not $auth) {
              Write-Host "Error: uDrop auth failed before download. Stopping early to avoid wasting time on a large file."
              exit 1
            }

            $tok = $auth.token
            $acc = $auth.account_id
            $listBody = @{ access_token = $tok; account_id = $acc }
            if ($folderId) { $listBody.parent_folder_id = $folderId }
            $list = Invoke-RestMethod -Uri "https://www.udrop.com/api/v2/folder/listing" -Method Post -Body $listBody
            if ($list -and $list.data -and $list.data.files) {
              $hit = $list.data.files | Where-Object { $_.filename -eq $fileName } | Select-Object -First 1
              if ($hit) { $udropHasFile = $true }
            }
          } catch {
            Write-Host "Error: Pre-check on uDrop failed before download: $($_.Exception.Message)"
            exit 1
          }

          if ($udropHasFile) {
            Write-Host "File already exists on uDrop. Skipping download/upload and updating memory marker."
            Add-Content -Path $env:GITHUB_ENV -Value "SKIP_UPLOAD=true"
            Add-Content -Path $env:GITHUB_ENV -Value "FILE_NAME=$fileName"
            if ($versionMarker) {
              Add-Content -Path $env:GITHUB_ENV -Value "FILE_VERSION=$versionMarker|$fileMarker"
            } else {
              Add-Content -Path $env:GITHUB_ENV -Value "FILE_VERSION=$fileMarker"
            }
            Add-Content -Path $env:GITHUB_ENV -Value "SHOULD_UPDATE_MEMORY=true"
            exit 0
          }

          Write-Host "Downloading package..."
          $downloadArgs = @(
            "-L",
            "--fail",
            "--retry", "5",
            "--retry-delay", "2",
            "--retry-all-errors",
            "--continue-at", "-",
            "--output", $fileName,
            $target.url
          )
          curl.exe @downloadArgs

          if ($LASTEXITCODE -ne 0 -or -not (Test-Path $fileName)) {
              Write-Host "Error: Download failed; file not found after download."
              exit 1
          }

          Add-Content -Path $env:GITHUB_ENV -Value "SKIP_UPLOAD=false"
          Add-Content -Path $env:GITHUB_ENV -Value "FILE_NAME=$fileName"
          if ($versionMarker) {
            Add-Content -Path $env:GITHUB_ENV -Value "FILE_VERSION=$versionMarker|$fileMarker"
          } else {
            Add-Content -Path $env:GITHUB_ENV -Value "FILE_VERSION=$fileMarker"
          }
          Add-Content -Path $env:GITHUB_ENV -Value "SHOULD_UPDATE_MEMORY=true"

      - name: Upload to uDrop
        if: env.SKIP_UPLOAD == 'false'
        shell: bash
        run: |
          echo "Mirroring ${FILE_NAME} to uDrop..."

          AUTH_JSON="$(curl -fsS -X POST "https://www.udrop.com/api/v2/authorize" \
            -d "key1=${{ secrets.UDROP_KEY1 }}" \
            -d "key2=${{ secrets.UDROP_KEY2 }}")" || {
            echo "uDrop auth request failed."
            exit 1
          }

          export AUTH_JSON
          AUTH_STATUS="$(python -c 'import json, os; data=json.loads(os.environ["AUTH_JSON"]); print(data.get("_status",""))')"
          TOKEN="$(python -c 'import json, os; data=json.loads(os.environ["AUTH_JSON"]); vals=[data.get("access_token"), data.get("token"), (data.get("data") or {}).get("access_token"), (data.get("data") or {}).get("token"), (data.get("response") or {}).get("access_token"), (data.get("response") or {}).get("token")]; print(next((str(v).strip() for v in vals if v), ""))')"
          ACC_ID="$(python -c 'import json, os; data=json.loads(os.environ["AUTH_JSON"]); vals=[data.get("account_id"), data.get("acc_id"), data.get("user_id"), (data.get("data") or {}).get("account_id"), (data.get("data") or {}).get("acc_id"), (data.get("data") or {}).get("user_id"), (data.get("response") or {}).get("account_id"), (data.get("response") or {}).get("acc_id"), (data.get("response") or {}).get("user_id")]; print(next((str(v).strip() for v in vals if v), ""))')"

          if [ "$AUTH_STATUS" != "success" ] || [ -z "$TOKEN" ] || [ -z "$ACC_ID" ]; then
            echo "uDrop auth failed."
            echo "$AUTH_JSON"
            exit 1
          fi

          LIST_ARGS=(
            -fsS -X POST "https://www.udrop.com/api/v2/folder/listing"
            -d "access_token=${TOKEN}"
            -d "account_id=${ACC_ID}"
          )
          if [ -n "${UDROP_FOLDER_ID}" ]; then
            LIST_ARGS+=(-d "parent_folder_id=${UDROP_FOLDER_ID}")
          fi
          LIST_JSON="$(curl "${LIST_ARGS[@]}")" || {
            echo "uDrop folder listing failed."
            exit 1
          }

          export LIST_JSON
          EXISTS="$(python -c 'import json, os; data=json.loads(os.environ["LIST_JSON"]); files=((data.get("data") or {}).get("files") or []); target=os.environ["FILE_NAME"]; print("yes" if any((f or {}).get("filename") == target for f in files) else "no")')"

          if [ "$EXISTS" = "yes" ]; then
            echo "File already exists on uDrop, skipping upload: ${FILE_NAME}"
            exit 0
          fi

          UPLOAD_ARGS=(
            -sS -X POST "https://www.udrop.com/api/v2/file/upload"
            -F "access_token=${TOKEN}"
            -F "account_id=${ACC_ID}"
            -F "upload_file=@${FILE_NAME}"
          )
          if [ -n "${UDROP_FOLDER_ID}" ]; then
            UPLOAD_ARGS+=(-F "folder_id=${UDROP_FOLDER_ID}")
          fi
          UPLOAD_JSON="$(curl "${UPLOAD_ARGS[@]}")"
          CURL_EXIT=$?
          if [ $CURL_EXIT -ne 0 ]; then
            echo "Upload request failed."
            exit 1
          fi

          export UPLOAD_JSON
          UPLOAD_STATUS="$(python -c 'import json, os; data=json.loads(os.environ["UPLOAD_JSON"]); print(data.get("_status",""))')"
          if [ "$UPLOAD_STATUS" != "success" ]; then
            echo "Upload failed."
            echo "$UPLOAD_JSON"
            exit 1
          fi

          echo "Upload Complete!"
          echo "$UPLOAD_JSON"

      - name: Update Memory Secret
        if: env.SHOULD_UPDATE_MEMORY == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "Missing GH_PAT secret. Add a fine-grained token with Secrets write access to this repo."
            exit 1
          fi
          echo "${{ env.FILE_VERSION }}" | gh secret set NIX_LAST_VERSION --repo "${{ github.repository }}" --body -
