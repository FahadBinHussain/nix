name: Nix - Premium MS Store Archiver

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  nix-process:
    runs-on: ubuntu-latest # Switched to Linux for faster Playwright performance

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: npx playwright install chromium

      - name: Restore Memory from Hidden Branch
        shell: bash
        run: |
          git fetch origin bot-memory || true
          git checkout origin/bot-memory -- latest_version.txt || echo "none" > latest_version.txt
          echo "CURRENT_MEM=$(cat latest_version.txt)" >> $GITHUB_ENV

      - name: Scrape Store Link (Bypass Cloudflare)
        id: scraper
        env:
          PRODUCT_ID: ${{ secrets.PRODUCT_ID }}
        run: |
          node -e "
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage();
            console.log('Navigating to Store API...');
            
            await page.goto('https://store.rg-adguard.net/');
            await page.fill('#url', process.env.PRODUCT_ID);
            await page.selectOption('#ring', 'Retail');
            await page.click('input[type=\"button\"]');
            
            console.log('Waiting for Cloudflare and Results...');
            try {
              // This waits up to 60 seconds for the table to appear (solving challenge)
              await page.waitForSelector('table.table', { timeout: 60000 });
              
              const links = await page.\$\$eval('table.table a', anchors => 
                anchors.map(a => ({ href: a.href, text: a.innerText }))
              );
              
              // Logic to find Bundle or x64
              let target = links.find(l => l.text.endsWith('.msixbundle') || l.text.endsWith('.appxbundle'));
              if (!target) {
                target = links.find(l => (l.text.includes('_x64_') || l.text.includes('_neutral_')) && 
                                          (l.text.endsWith('.msix') || l.text.endsWith('.appx')) &&
                                          !l.text.endsWith('.BlockMap'));
              }
              
              if (target) {
                console.log('FOUND_FILE=' + target.text);
                console.log('FOUND_URL=' + target.href);
                require('fs').appendFileSync(process.env.GITHUB_ENV, 'FILE_NAME=' + target.text + '\n');
                require('fs').appendFileSync(process.env.GITHUB_ENV, 'TARGET_URL=' + target.href + '\n');
              } else {
                console.error('No valid links found in table.');
                process.exit(1);
              }
            } catch (e) {
              console.error('Timeout or block: ' + e.message);
              process.exit(1);
            }
            await browser.close();
          })();
          "

      - name: Version Check
        run: |
          STORE_VER="${{ env.FILE_NAME }}"
          MEM_VER="${{ env.CURRENT_MEM }}"
          if [ "$STORE_VER" == "$MEM_VER" ]; then
            echo "SKIP_UPLOAD=true" >> $GITHUB_ENV
            echo "Version matches. Skipping."
          else
            echo "SKIP_UPLOAD=false" >> $GITHUB_ENV
            echo "New version detected!"
          fi

      - name: Download and Mirror to uDrop
        if: env.SKIP_UPLOAD == 'false'
        run: |
          echo "Downloading ${{ env.FILE_NAME }}..."
          curl -L -o "${{ env.FILE_NAME }}" "${{ env.TARGET_URL }}"
          
          echo "Authenticating with uDrop..."
          AUTH_RES=$(curl -s -X POST "https://www.udrop.com/api/v2/authorize" \
            -d "key1=${{ secrets.UDROP_KEY1 }}&key2=${{ secrets.UDROP_KEY2 }}")
          
          # Extract tokens using python (cleaner than bash/sed)
          TOKEN=$(echo $AUTH_RES | python3 -c "import sys, json; data=json.load(sys.stdin); print(data.get('access_token') or data['response']['access_token'])")
          ACC_ID=$(echo $AUTH_RES | python3 -c "import sys, json; data=json.load(sys.stdin); print(data.get('account_id') or data['response']['account_id'])")
          
          echo "Uploading to uDrop Account: $ACC_ID..."
          curl -X POST "https://www.udrop.com/api/v2/file/upload" \
            -F "access_token=$TOKEN" \
            -F "account_id=$ACC_ID" \
            -F "upload_file=@${{ env.FILE_NAME }}"

      - name: Update Memory Branch
        if: env.SKIP_UPLOAD == 'false'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan bot-memory || git checkout bot-memory
          git rm -rf . || true
          echo "${{ env.FILE_NAME }}" > latest_version.txt
          git add latest_version.txt
          git commit -m "Nix Update: ${{ env.FILE_NAME }}"
          git push origin bot-memory --force