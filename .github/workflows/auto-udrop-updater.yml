name: Nix - Official Mirror

on:
  push:
  workflow_dispatch:

concurrency:
  group: nix-official-mirror-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  TERABOX_ENABLED: 'true'
  MEGA_ENABLED: 'false'
  DDOWNLOAD_ENABLED: 'false'

jobs:
  nix-sync:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Load Memory from Secret
        shell: bash
        run: |
          if [ -z "${{ secrets.NIX_LAST_VERSION }}" ]; then
            echo "CURRENT_MEM=none" >> $GITHUB_ENV
          else
            echo "CURRENT_MEM=${{ secrets.NIX_LAST_VERSION }}" >> $GITHUB_ENV
          fi

      - name: Fetch App via DanStore API
        shell: powershell
        run: |
          function Get-UdropAuth {
            param(
              [string]$Key1,
              [string]$Key2
            )

            $raw = $null
            try {
              $raw = (Invoke-WebRequest -Uri "https://www.udrop.com/api/v2/authorize" -Method Post -Body @{ key1 = $Key1; key2 = $Key2 } -UseBasicParsing).Content
            } catch {
              return $null
            }

            if (-not $raw) { return $null }

            $json = $null
            try {
              $json = $raw | ConvertFrom-Json
            } catch {
              return $null
            }

            $token = @(
              $json.access_token,
              $json.token,
              $json.data.access_token,
              $json.data.token,
              $json.response.access_token,
              $json.response.token
            ) | Where-Object { $_ } | Select-Object -First 1

            $accountId = @(
              $json.account_id,
              $json.acc_id,
              $json.user_id,
              $json.data.account_id,
              $json.data.acc_id,
              $json.data.user_id,
              $json.response.account_id,
              $json.response.acc_id,
              $json.response.user_id
            ) | Where-Object { $_ } | Select-Object -First 1

            if ($token) { $token = "$token".Trim() }
            if ($accountId) { $accountId = "$accountId".Trim() }

            if ($json._status -ne "success" -or -not $token -or -not $accountId) {
              return $null
            }

            return @{
              token = $token
              account_id = $accountId
            }
          }

          $productId = "${{ secrets.PRODUCT_ID }}"

          if (-not $productId) {
              Write-Host "Error: PRODUCT_ID secret is empty."
              exit 1
          }

          Write-Host "Querying DanStore API for ID: $productId..."
          $apiUrl = "https://danstore-ms.vercel.app/api/packages?id=$productId&type=ProductId&environment=Production"
          $headers = @{
              "User-Agent" = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36"
              "Accept" = "application/json, text/plain, */*"
              "Referer" = "https://danstore-ms.vercel.app/"
              "Origin" = "https://danstore-ms.vercel.app"
          }

          try {
              $resp = Invoke-RestMethod -Uri $apiUrl -Method Get -Headers $headers -TimeoutSec 60
          } catch {
              Write-Host "Error: DanStore API request failed: $($_.Exception.Message)"
              exit 1
          }

          if (-not $resp -or -not $resp.packages -or $resp.packages.Count -eq 0) {
              Write-Host "Error: No packages returned by DanStore API."
              exit 1
          }

          # Prefer bundle packages first, then x64/neutral app packages.
          $priority = @{
              "MSIXBUNDLE" = 1
              "APPXBUNDLE" = 1
              "EMSIXBUNDLE" = 1
              "MSIX" = 2
              "APPX" = 2
          }
          $candidates = @(
              $resp.packages |
              Where-Object {
                  $priority.ContainsKey($_.type) -and
                  ($_.architecture -in @("neutral", "x64", "", $null))
              } |
              Sort-Object `
                  @{ Expression = { if ($priority.ContainsKey($_.type)) { $priority[$_.type] } else { 9 } } }, `
                  @{ Expression = { try { [version]$_.version } catch { [version]"0.0.0.0" } }; Descending = $true }
          )

          if ($candidates.Count -eq 0) {
              Write-Host "Error: No suitable downloadable package candidate found."
              exit 1
          }

          $target = $candidates[0]
          $extMap = @{
              "MSIXBUNDLE" = "msixbundle"
              "APPXBUNDLE" = "appxbundle"
              "EMSIXBUNDLE" = "emsixbundle"
              "MSIX" = "msix"
              "APPX" = "appx"
          }
          $ext = if ($extMap.ContainsKey($target.type)) { $extMap[$target.type] } else { "bin" }
          $fileName = "$($target.fileName).$ext"
          $versionMarker = if ($target.version -and $target.version -ne "Unknown") { $target.version } else { "" }
          $fileMarker = $fileName

          $latestKnown = "${{ env.CURRENT_MEM }}".Trim()
          $knownParts = @()
          if ($latestKnown) {
            $knownParts = $latestKnown.Split("|") | Where-Object { $_ -and $_.Trim().Length -gt 0 } | ForEach-Object { $_.Trim() }
          }
          $alreadyProcessed = ($knownParts -contains $fileMarker) -or (($versionMarker -ne "") -and ($knownParts -contains $versionMarker))

          if ($alreadyProcessed) {
              Write-Host "App is up to date. Skipping."
              Add-Content -Path $env:GITHUB_ENV -Value "SKIP_UPLOAD=true"
              Add-Content -Path $env:GITHUB_ENV -Value "SHOULD_UPDATE_MEMORY=false"
              exit 0
          }

          Write-Host "New package found: $fileName (version: $($target.version))"
          
          # Check uDrop first to avoid duplicate download/upload when file already exists there.
          $k1 = "${{ secrets.UDROP_KEY1 }}"
          $k2 = "${{ secrets.UDROP_KEY2 }}"
          $folderId = "${{ secrets.UDROP_FOLDER_ID }}"
          $udropHasFile = $false

          if (-not $k1 -or -not $k2) {
            Write-Host "Error: UDROP_KEY1/UDROP_KEY2 secrets are missing."
            exit 1
          }

          try {
            $auth = Get-UdropAuth -Key1 $k1 -Key2 $k2
            if (-not $auth) {
              Write-Host "Error: uDrop auth failed before download. Stopping early to avoid wasting time on a large file."
              exit 1
            }

            $tok = $auth.token
            $acc = $auth.account_id
            Add-Content -Path $env:GITHUB_ENV -Value "UDROP_TOKEN=$tok"
            Add-Content -Path $env:GITHUB_ENV -Value "UDROP_ACCOUNT_ID=$acc"
            $listBody = @{ access_token = $tok; account_id = $acc }
            if ($folderId) { $listBody.parent_folder_id = $folderId }
            $list = Invoke-RestMethod -Uri "https://www.udrop.com/api/v2/folder/listing" -Method Post -Body $listBody
            if ($list -and $list.data -and $list.data.files) {
              $hit = $list.data.files | Where-Object { $_.filename -eq $fileName } | Select-Object -First 1
              if ($hit) { $udropHasFile = $true }
            }
          } catch {
            Write-Host "Error: Pre-check on uDrop failed before download: $($_.Exception.Message)"
            exit 1
          }

          if ($udropHasFile) {
            Write-Host "File already exists on uDrop. Skipping download/upload and updating memory marker."
            Add-Content -Path $env:GITHUB_ENV -Value "SKIP_UPLOAD=true"
            Add-Content -Path $env:GITHUB_ENV -Value "FILE_NAME=$fileName"
            if ($versionMarker) {
              Add-Content -Path $env:GITHUB_ENV -Value "FILE_VERSION=$versionMarker|$fileMarker"
            } else {
              Add-Content -Path $env:GITHUB_ENV -Value "FILE_VERSION=$fileMarker"
            }
            Add-Content -Path $env:GITHUB_ENV -Value "SHOULD_UPDATE_MEMORY=true"
            exit 0
          }

          Write-Host "Downloading package..."
          $downloadArgs = @(
            "-L",
            "--fail",
            "--retry", "5",
            "--retry-delay", "2",
            "--retry-all-errors",
            "--continue-at", "-",
            "--output", $fileName,
            $target.url
          )
          curl.exe @downloadArgs

          if ($LASTEXITCODE -ne 0 -or -not (Test-Path $fileName)) {
              Write-Host "Error: Download failed; file not found after download."
              exit 1
          }

          Add-Content -Path $env:GITHUB_ENV -Value "SKIP_UPLOAD=false"
          Add-Content -Path $env:GITHUB_ENV -Value "FILE_NAME=$fileName"
          if ($versionMarker) {
            Add-Content -Path $env:GITHUB_ENV -Value "FILE_VERSION=$versionMarker|$fileMarker"
          } else {
            Add-Content -Path $env:GITHUB_ENV -Value "FILE_VERSION=$fileMarker"
          }
          Add-Content -Path $env:GITHUB_ENV -Value "SHOULD_UPDATE_MEMORY=true"

      - name: Upload to uDrop
        if: env.SKIP_UPLOAD == 'false'
        shell: pwsh
        run: |
          Write-Host "Mirroring $($env:FILE_NAME) to uDrop..."

          $token = "$env:UDROP_TOKEN".Trim()
          $accountId = "$env:UDROP_ACCOUNT_ID".Trim()
          $folderId = "${{ secrets.UDROP_FOLDER_ID }}"

          if (-not $token -or -not $accountId) {
            Write-Host "Upload failed: missing uDrop session from fetch step."
            exit 1
          }

          $filePath = (Resolve-Path -LiteralPath $env:FILE_NAME).Path
          
          # Use Invoke-RestMethod with -Form parameter (PowerShell 6.1+)
          $formFields = @{
            access_token = $token
            account_id = $accountId
            upload_file = Get-Item -LiteralPath $filePath
          }
          
          if ($folderId) {
            $formFields.folder_id = $folderId
          }

          try {
            $uploadJson = Invoke-RestMethod `
              -Uri "https://www.udrop.com/api/v2/file/upload" `
              -Method Post `
              -Form $formFields `
              -TimeoutSec 1800
          } catch {
            Write-Host "Upload request failed: $($_.Exception.Message)"
            if ($_.ErrorDetails.Message) {
              Write-Host $_.ErrorDetails.Message
            }
            Write-Host "Skipping uDrop upload, will continue with other providers."
            Add-Content -Path $env:GITHUB_ENV -Value "UDROP_FAILED=true"
          }

          if ($uploadJson -and $uploadJson._status -eq "success") {
            $uploadResult = $uploadJson | ConvertTo-Json -Depth 10 -Compress
            Write-Host "uDrop Upload Complete!"
            Write-Host $uploadResult
          } else {
            Write-Host "uDrop upload did not succeed, continuing with other providers."
            Add-Content -Path $env:GITHUB_ENV -Value "UDROP_FAILED=true"
          }

      - name: Install TeraBox client
        if: env.SHOULD_UPDATE_MEMORY == 'true' && env.TERABOX_ENABLED == 'true'
        shell: pwsh
        run: |
          $tbDir = Join-Path $env:RUNNER_TEMP "terabox-client"

          if (Test-Path $tbDir) {
            Remove-Item -LiteralPath $tbDir -Recurse -Force
          }

          New-Item -ItemType Directory -Force -Path $tbDir | Out-Null
          Push-Location $tbDir

          npm init -y | Out-Null
          npm install --no-fund --no-audit --loglevel=error terabox-upload-tool@1.4.1

          if ($LASTEXITCODE -ne 0) {
            Pop-Location
            Write-Host "Failed to install TeraBox client package."
            exit 1
          }

          Pop-Location

          $modulePath = Join-Path $tbDir "node_modules\terabox-upload-tool"
          if (-not (Test-Path $modulePath)) {
            Write-Host "TeraBox client package was installed but the module path was not found: $modulePath"
            exit 1
          }

          Add-Content -Path $env:GITHUB_ENV -Value "TERABOX_CLIENT_DIR=$tbDir"
          Add-Content -Path $env:GITHUB_ENV -Value "TERABOX_UPLOAD_TOOL_PATH=$modulePath"

      - name: Upload to TeraBox
        if: env.SHOULD_UPDATE_MEMORY == 'true' && env.TERABOX_ENABLED == 'true'
        shell: pwsh
        env:
          TERABOX_NDUS: ${{ secrets.TERABOX_NDUS }}
          TERABOX_JSTOKEN: ${{ secrets.TERABOX_JSTOKEN }}
          TERABOX_APP_ID: ${{ secrets.TERABOX_APP_ID }}
          TERABOX_BDSTOKEN: ${{ secrets.TERABOX_BDSTOKEN }}
          TERABOX_BROWSER_ID: ${{ secrets.TERABOX_BROWSER_ID }}
          TERABOX_REMOTE_DIR: ${{ secrets.TERABOX_REMOTE_DIR }}
        run: |
          Write-Host "Mirroring $($env:FILE_NAME) to TeraBox..."

          if (-not $env:FILE_NAME) {
            Write-Host "FILE_NAME is missing. TeraBox upload cannot continue."
            exit 1
          }

          if (-not $env:TERABOX_NDUS -or -not $env:TERABOX_JSTOKEN) {
            Write-Host "One or more required TeraBox secrets are missing: TERABOX_NDUS, TERABOX_JSTOKEN."
            exit 1
          }

          if (-not $env:TERABOX_UPLOAD_TOOL_PATH) {
            Write-Host "TERABOX_UPLOAD_TOOL_PATH is missing from the install step."
            exit 1
          }

          if (-not $env:TERABOX_APP_ID) {
            $env:TERABOX_APP_ID = "250528"
          }

          if (-not $env:TERABOX_REMOTE_DIR) {
            $env:TERABOX_REMOTE_DIR = "/nix"
          }

          node .github\scripts\terabox-sync.cjs

          if ($LASTEXITCODE -ne 0) {
            exit 1
          }

      - name: Install MEGAcmd
        if: env.SKIP_UPLOAD == 'false' && env.MEGA_ENABLED == 'true'
        shell: pwsh
        run: |
          $installerUrl = "https://mega.nz/MEGAcmdSetup64.exe"
          $installerPath = Join-Path $env:RUNNER_TEMP "MEGAcmdSetup64.exe"
          $megaCmdDir = Join-Path $env:LOCALAPPDATA "MEGAcmd"

          Write-Host "Installing MEGAcmd..."
          curl.exe -L --fail --silent --show-error --output $installerPath $installerUrl

          if ($LASTEXITCODE -ne 0 -or -not (Test-Path $installerPath)) {
            Write-Host "Failed to download MEGAcmd installer."
            exit 1
          }

          $installProc = Start-Process -FilePath $installerPath -ArgumentList "/S" -Wait -PassThru -WindowStyle Hidden

          if ($installProc.ExitCode -ne 0) {
            Write-Host "MEGAcmd silent install failed with exit code $($installProc.ExitCode)."
            exit 1
          }

          if (-not (Test-Path (Join-Path $megaCmdDir "mega-put.bat"))) {
            Write-Host "MEGAcmd install completed but client commands were not found in $megaCmdDir."
            exit 1
          }

          Add-Content -Path $env:GITHUB_ENV -Value "MEGACMD_DIR=$megaCmdDir"

      - name: Upload to MEGA
        if: env.SKIP_UPLOAD == 'false' && env.MEGA_ENABLED == 'true'
        shell: pwsh
        run: |
          Write-Host "Mirroring $($env:FILE_NAME) to MEGA..."

          $megaEmail = "${{ secrets.MEGA_EMAIL }}"
          $megaPassword = "${{ secrets.MEGA_PASSWORD }}"
          $megaRemoteDir = "${{ secrets.MEGA_REMOTE_DIR }}"
          $megaCmdDir = if ($env:MEGACMD_DIR) { $env:MEGACMD_DIR } else { Join-Path $env:LOCALAPPDATA "MEGAcmd" }
          $filePath = (Resolve-Path -LiteralPath $env:FILE_NAME).Path
          $fileName = [System.IO.Path]::GetFileName($filePath)

          if (-not $megaEmail -or -not $megaPassword) {
            Write-Host "Error: MEGA_EMAIL/MEGA_PASSWORD secrets are missing."
            exit 1
          }

          if (-not $megaRemoteDir) {
            $megaRemoteDir = "/"
          } elseif (-not $megaRemoteDir.StartsWith("/")) {
            $megaRemoteDir = "/$megaRemoteDir"
          }

          $megaLogin = Join-Path $megaCmdDir "mega-login.bat"
          $megaLogout = Join-Path $megaCmdDir "mega-logout.bat"
          $megaMkdir = Join-Path $megaCmdDir "mega-mkdir.bat"
          $megaFind = Join-Path $megaCmdDir "mega-find.bat"
          $megaPut = Join-Path $megaCmdDir "mega-put.bat"
          $megaWhoAmI = Join-Path $megaCmdDir "mega-whoami.bat"
          $megaUpdate = Join-Path $megaCmdDir "mega-update.bat"

          foreach ($cmd in @($megaLogin, $megaLogout, $megaMkdir, $megaFind, $megaPut, $megaWhoAmI)) {
            if (-not (Test-Path $cmd)) {
              Write-Host "Required MEGAcmd client was not found: $cmd"
              exit 1
            }
          }

          try {
            if (Test-Path $megaUpdate) {
              & $megaUpdate --auto=OFF | Out-Host
            }

            & $megaLogout 2>$null | Out-Null
            & $megaLogin $megaEmail $megaPassword | Out-Host

            if ($LASTEXITCODE -ne 0) {
              throw "MEGA login failed."
            }

            & $megaWhoAmI | Out-Host
            if ($LASTEXITCODE -ne 0) {
              throw "MEGA session validation failed."
            }

            if ($megaRemoteDir -ne "/") {
              & $megaMkdir -p $megaRemoteDir | Out-Host
              if ($LASTEXITCODE -ne 0) {
                throw "Failed to ensure remote MEGA folder exists: $megaRemoteDir"
              }
            }

            $megaFindOutput = & $megaFind $megaRemoteDir "--pattern=$fileName" --type=f 2>&1
            if ($LASTEXITCODE -ne 0) {
              $megaFindText = ($megaFindOutput | ForEach-Object { "$_" }) -join "`n"
              throw "MEGA existence check failed.`n$megaFindText"
            }

            $megaExisting = $megaFindOutput |
              ForEach-Object { "$_".Trim() } |
              Where-Object { $_ -and $_.EndsWith("/$fileName") }

            if ($megaExisting) {
              Write-Host "File already exists in MEGA. Skipping upload."
            } else {
              & $megaPut $filePath $megaRemoteDir | Out-Host
              if ($LASTEXITCODE -ne 0) {
                throw "MEGA upload failed."
              }

              Write-Host "MEGA Upload Complete!"
            }
          } catch {
            Write-Host $_.Exception.Message
            exit 1
          } finally {
            & $megaLogout 2>$null | Out-Null
          }

      - name: Upload to DDownload
        if: env.SKIP_UPLOAD == 'false' && env.DDOWNLOAD_ENABLED == 'true'
        shell: pwsh
        run: |
          Write-Host "Mirroring $($env:FILE_NAME) to DDownload..."

          $apiKey = "${{ secrets.DDOWNLOAD_API_KEY }}"
          
          if (-not $apiKey) {
            Write-Host "DDOWNLOAD_API_KEY secret is missing. Skipping DDownload upload."
            exit 0
          }

          $filePath = (Resolve-Path -LiteralPath $env:FILE_NAME).Path
          $fileInfo = Get-Item -LiteralPath $filePath
          $fileName = $fileInfo.Name
          $fileSize = $fileInfo.Length

          function Test-DDownloadUploadResult {
            param(
              [Parameter(Mandatory = $true)]
              [object]$UploadJson
            )

            $entry = if ($UploadJson -is [System.Array]) {
              $UploadJson | Select-Object -First 1
            } else {
              $UploadJson
            }

            $fileCode = "$($entry.file_code)".Trim()
            $fileStatus = "$($entry.file_status)".Trim()

            if (-not $fileCode -or $fileCode -eq "undef") {
              return $false
            }

            if (-not $fileStatus) {
              return $true
            }

            return $fileStatus -match '^(OK|success)$'
          }

          function Test-DDownloadFileExists {
            param(
              [Parameter(Mandatory = $true)]
              [string]$ApiKey,
              [Parameter(Mandatory = $true)]
              [string]$Name,
              [Parameter(Mandatory = $true)]
              [long]$Size
            )

            $nameEscaped = [System.Uri]::EscapeDataString($Name)
            $existsUrl = "https://api-v2.ddownload.com/api/file/exists?key=$ApiKey&name=$nameEscaped&size=$Size"
            $existsJson = Invoke-RestMethod -Uri $existsUrl -Method Get -TimeoutSec 60

            $exists = ($existsJson.status -eq 200) -and `
              $existsJson.result -and `
              ($existsJson.result.exists -eq 1) -and `
              $existsJson.result.matches -and `
              ($existsJson.result.matches.Count -gt 0)

            return $exists
          }

          function Invoke-DDownloadUpload {
            param(
              [Parameter(Mandatory = $true)]
              [string]$UploadUrl,
              [Parameter(Mandatory = $true)]
              [string]$SessId,
              [Parameter(Mandatory = $true)]
              [string]$FilePath,
              [string]$UploadType
            )

            $curlArgs = @(
              "--silent",
              "--show-error",
              "--location",
              "--request", "POST",
              "--form", "sess_id=$SessId",
              "--form", "file=@$FilePath"
            )

            if ($UploadType) {
              $curlArgs += @("--form", "utype=$UploadType")
            }

            $raw = & curl.exe $UploadUrl @curlArgs
            if ($LASTEXITCODE -ne 0) {
              throw "curl upload failed with exit code $LASTEXITCODE."
            }

            if (-not $raw) {
              throw "DDownload upload returned an empty response."
            }

            try {
              return $raw | ConvertFrom-Json
            } catch {
              throw "DDownload upload returned non-JSON: $raw"
            }
          }
          
          # Step 1: Get upload server and session ID
          try {
            $serverInfo = Invoke-RestMethod `
              -Uri "https://api-v2.ddownload.com/api/upload/server?key=$apiKey" `
              -Method Get `
              -TimeoutSec 30
            
            if ($serverInfo.status -ne 200) {
              Write-Host "Failed to get upload server: $($serverInfo.msg)"
              exit 1
            }
            
            $uploadUrl = $serverInfo.result
            $sessId = $serverInfo.sess_id

            if (-not $uploadUrl -or -not $sessId) {
              Write-Host "Upload server response was incomplete."
              Write-Host ($serverInfo | ConvertTo-Json -Depth 10 -Compress)
              exit 1
            }
            
            Write-Host "Got upload server: $uploadUrl"
          } catch {
            Write-Host "Failed to get upload server: $($_.Exception.Message)"
            exit 1
          }
          
          # Step 2: Upload file
          $uploadJson = $null
          $uploadOk = $false
          try {
            $uploadJson = Invoke-DDownloadUpload -UploadUrl $uploadUrl -SessId $sessId -FilePath $filePath
            $uploadOk = Test-DDownloadUploadResult -UploadJson $uploadJson

            if (-not $uploadOk) {
              Write-Host "Primary DDownload upload response was not accepted. Retrying with explicit upload type."
              $uploadJson = Invoke-DDownloadUpload -UploadUrl $uploadUrl -SessId $sessId -FilePath $filePath -UploadType "prem"
              $uploadOk = Test-DDownloadUploadResult -UploadJson $uploadJson
            }
          } catch {
            Write-Host "DDownload upload failed: $($_.Exception.Message)"
            exit 1
          }

          $resultJson = $uploadJson | ConvertTo-Json -Depth 10 -Compress

          if ($uploadOk) {
            Write-Host "DDownload Upload Complete!"
            Write-Host $resultJson
            exit 0
          }

          Write-Host "DDownload upload response did not confirm success."
          Write-Host $resultJson

          try {
            if (Test-DDownloadFileExists -ApiKey $apiKey -Name $fileName -Size $fileSize) {
              Write-Host "DDownload file existence check confirmed the upload."
              exit 0
            }
          } catch {
            Write-Host "DDownload post-upload verification failed: $($_.Exception.Message)"
          }

          exit 1

      - name: Update Memory Secret
        if: env.SHOULD_UPDATE_MEMORY == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "Missing GH_PAT secret. Add a fine-grained token with Secrets write access to this repo."
            exit 1
          fi
          echo "${{ env.FILE_VERSION }}" | gh secret set NIX_LAST_VERSION --repo "${{ github.repository }}" --body -
