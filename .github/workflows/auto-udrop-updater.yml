name: Nix Final Stable

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-and-upload:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Restore Memory from Hidden Branch
        shell: bash
        run: |
          git fetch origin bot-memory || true
          git checkout origin/bot-memory -- latest_version.txt || echo "none" > latest_version.txt
          echo "CURRENT_MEM=$(cat latest_version.txt)" >> $GITHUB_ENV

      - name: Check Store API
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $productId = "${{ secrets.PRODUCT_ID }}"
          $UserAgent = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36"
          
          Write-Host "Fetching Product ID: $productId"
          
          # Use curl with standard browser headers
          $Response = curl.exe -s -k -X POST "https://store.rg-adguard.net/api/GetFiles" `
            -H "Content-Type: application/x-www-form-urlencoded" `
            -H "User-Agent: $UserAgent" `
            -H "Referer: https://store.rg-adguard.net/" `
            --data-binary "type=ProductId&url=$productId&ring=Retail&lang=en-US"

          # VALIDATION: Check if we got links at all
          if ($Response -notmatch "<table" -or $Response -match "Just a moment") {
              Write-Host "ERROR: Cloudflare blocked the request or the API returned no results."
              Write-Host "Showing raw response snippet for debugging:"
              Write-Host ($Response.Substring(0, [math]::Min(500, $Response.Length)))
              exit 1
          }

          $Links = [regex]::Matches($Response, '<a href="(.*?)".*?>(.*?)<\/a>')
          $TargetUrl = ""; $TargetName = ""
          
          # Strategy: Find the biggest bundle or x64 msix
          foreach ($Link in $Links) {
              $Url = $Link.Groups[1].Value
              $Filename = $Link.Groups[2].Value
              if ($Filename -match "\.msixbundle$" -or $Filename -match "\.appxbundle$") {
                  $TargetUrl = $Url; $TargetName = $Filename; break
              }
          }
          if ($TargetUrl -eq "") {
             foreach ($Link in $Links) {
                 $Url = $Link.Groups[1].Value; $Filename = $Link.Groups[2].Value
                 if (($Filename -match "\.msix$" -or $Filename -match "\.appx$") -and ($Filename -notmatch "\.BlockMap$")) {
                     if ($Filename -match "_x64_" -or $Filename -match "_neutral_") {
                         $TargetUrl = $Url; $TargetName = $Filename; break
                     }
                 }
             }
          }

          # Safety check before proceeding
          if ([string]::IsNullOrEmpty($TargetName) -or [string]::IsNullOrEmpty($TargetUrl)) {
              Write-Host "Error: Logic matched 0 files. Check if ProductID is correct."
              exit 1
          }

          $LatestKnown = "$env:CURRENT_MEM".Trim()
          Write-Host "Newest Store Version: $TargetName"
          
          if ($TargetName -eq $LatestKnown) {
              Write-Host "App is already cached. Skipping upload."
              "SKIP_UPLOAD=true" | Out-File -FilePath $env:GITHUB_ENV -Append
          } else {
              Write-Host "New Version Found! Ready to download."
              "SKIP_UPLOAD=false" | Out-File -FilePath $env:GITHUB_ENV -Append
              "TARGET_URL=$TargetUrl" | Out-File -FilePath $env:GITHUB_ENV -Append
              "FILE_NAME=$TargetName" | Out-File -FilePath $env:GITHUB_ENV -Append
          }

      - name: Download New Package
        if: env.SKIP_UPLOAD == 'false'
        shell: pwsh
        run: |
          Write-Host "Downloading: $env:FILE_NAME"
          # -L follows redirects, -k ignores SSL issues, -o saves the file
          curl.exe -L -k -o "$env:FILE_NAME" "$env:TARGET_URL"
          
          if (!(Test-Path "$env:FILE_NAME") -or (Get-Item "$env:FILE_NAME").Length -lt 1000) {
              Write-Host "Error: Download failed or file is empty."
              exit 1
          }
          $size = [math]::Round((Get-Item "$env:FILE_NAME").Length / 1MB, 2)
          Write-Host "Success. File Size: $size MB"

      - name: Upload Package to uDrop
        if: env.SKIP_UPLOAD == 'false'
        shell: pwsh
        run: |
          Write-Host "Authenticating with uDrop..."
          $AuthBody = @{ key1 = "${{ secrets.UDROP_KEY1 }}"; key2 = "${{ secrets.UDROP_KEY2 }}" }
          $AuthResponse = Invoke-RestMethod -Uri "https://www.udrop.com/api/v2/authorize" -Method Post -Body $AuthBody
          
          $AccessToken = if ($AuthResponse.access_token) { $AuthResponse.access_token } else { $AuthResponse.response.access_token }
          $AccountId = if ($AuthResponse.account_id) { $AuthResponse.account_id } else { $AuthResponse.response.account_id }

          Write-Host "Uploading to uDrop (Account: $AccountId)..."
          $Form = @{ access_token = $AccessToken; account_id = $AccountId; upload_file = Get-Item -Path $env:FILE_NAME }
          $UploadResponse = Invoke-RestMethod -Uri "https://www.udrop.com/api/v2/file/upload" -Method Post -Form $Form -TimeoutSec 600
          
          if ($UploadResponse.status -eq "success" -or $UploadResponse._status -eq "success") {
             Write-Host "Done! File uploaded to uDrop."
          } else {
             Write-Host "uDrop Error: $($UploadResponse.response)"
             exit 1
          }

      - name: Save Memory to Hidden Branch
        if: env.SKIP_UPLOAD == 'false'
        shell: bash
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan bot-memory || git checkout bot-memory
          git rm -rf . || true
          echo "${{ env.FILE_NAME }}" > latest_version.txt
          git add latest_version.txt
          git commit -m "Mirror update: ${{ env.FILE_NAME }}"
          git push origin bot-memory --force