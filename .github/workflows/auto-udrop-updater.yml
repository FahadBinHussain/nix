name: Nix - Official Mirror

on:
  push:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

concurrency:
  group: nix-official-mirror-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  nix-sync:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Load Memory from Secret
        shell: bash
        run: |
          if [ -z "${{ secrets.NIX_LAST_VERSION }}" ]; then
            echo "CURRENT_MEM=none" >> $GITHUB_ENV
          else
            echo "CURRENT_MEM=${{ secrets.NIX_LAST_VERSION }}" >> $GITHUB_ENV
          fi

      - name: Fetch App via DanStore API
        shell: powershell
        run: |
          $productId = "${{ secrets.PRODUCT_ID }}"

          if (-not $productId) {
              Write-Host "Error: PRODUCT_ID secret is empty."
              exit 1
          }

          Write-Host "Querying DanStore API for ID: $productId..."
          $apiUrl = "https://danstore-ms.vercel.app/api/packages?id=$productId&type=ProductId&environment=Production"
          $headers = @{
              "User-Agent" = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36"
              "Accept" = "application/json, text/plain, */*"
              "Referer" = "https://danstore-ms.vercel.app/"
              "Origin" = "https://danstore-ms.vercel.app"
          }

          try {
              $resp = Invoke-RestMethod -Uri $apiUrl -Method Get -Headers $headers -TimeoutSec 60
          } catch {
              Write-Host "Error: DanStore API request failed: $($_.Exception.Message)"
              exit 1
          }

          if (-not $resp -or -not $resp.packages -or $resp.packages.Count -eq 0) {
              Write-Host "Error: No packages returned by DanStore API."
              exit 1
          }

          # Prefer bundle packages first, then x64/neutral app packages.
          $priority = @{
              "MSIXBUNDLE" = 1
              "APPXBUNDLE" = 1
              "EMSIXBUNDLE" = 1
              "MSIX" = 2
              "APPX" = 2
          }
          $candidates = @(
              $resp.packages |
              Where-Object {
                  $priority.ContainsKey($_.type) -and
                  ($_.architecture -in @("neutral", "x64", "", $null))
              } |
              Sort-Object `
                  @{ Expression = { if ($priority.ContainsKey($_.type)) { $priority[$_.type] } else { 9 } } }, `
                  @{ Expression = { try { [version]$_.version } catch { [version]"0.0.0.0" } }; Descending = $true }
          )

          if ($candidates.Count -eq 0) {
              Write-Host "Error: No suitable downloadable package candidate found."
              exit 1
          }

          $target = $candidates[0]
          $extMap = @{
              "MSIXBUNDLE" = "msixbundle"
              "APPXBUNDLE" = "appxbundle"
              "EMSIXBUNDLE" = "emsixbundle"
              "MSIX" = "msix"
              "APPX" = "appx"
          }
          $ext = if ($extMap.ContainsKey($target.type)) { $extMap[$target.type] } else { "bin" }
          $fileName = "$($target.fileName).$ext"
          $versionMarker = if ($target.version -and $target.version -ne "Unknown") { $target.version } else { "" }
          $fileMarker = $fileName

          $latestKnown = "${{ env.CURRENT_MEM }}".Trim()
          $knownParts = @()
          if ($latestKnown) {
            $knownParts = $latestKnown.Split("|") | Where-Object { $_ -and $_.Trim().Length -gt 0 } | ForEach-Object { $_.Trim() }
          }
          $alreadyProcessed = ($knownParts -contains $fileMarker) -or (($versionMarker -ne "") -and ($knownParts -contains $versionMarker))

          if ($alreadyProcessed) {
              Write-Host "App is up to date. Skipping."
              Add-Content -Path $env:GITHUB_ENV -Value "SKIP_UPLOAD=true"
              exit 0
          }

          Write-Host "New package found: $fileName (version: $($target.version))"
          Write-Host "Downloading package..."
          Invoke-WebRequest -Uri $target.url -OutFile $fileName -UseBasicParsing -TimeoutSec 180

          if (-not (Test-Path $fileName)) {
              Write-Host "Error: Download failed; file not found after download."
              exit 1
          }

          Add-Content -Path $env:GITHUB_ENV -Value "SKIP_UPLOAD=false"
          Add-Content -Path $env:GITHUB_ENV -Value "FILE_NAME=$fileName"
          if ($versionMarker) {
            Add-Content -Path $env:GITHUB_ENV -Value "FILE_VERSION=$versionMarker|$fileMarker"
          } else {
            Add-Content -Path $env:GITHUB_ENV -Value "FILE_VERSION=$fileMarker"
          }

      - name: Upload to uDrop
        if: env.SKIP_UPLOAD == 'false'
        shell: powershell
        run: |
          Write-Host "Mirroring $($env:FILE_NAME) to uDrop..."
          $k1 = "${{ secrets.UDROP_KEY1 }}"
          $k2 = "${{ secrets.UDROP_KEY2 }}"
          $AuthBody = @{ key1 = $k1; key2 = $k2 }
          $AuthRes = $null
          $Token = $null
          $AccId = $null

          try {
            $AuthRes = Invoke-RestMethod -Uri "https://www.udrop.com/api/v2/authorize" -Method Post -Body $AuthBody
          } catch {
            Write-Host "Warning: Invoke-RestMethod auth failed: $($_.Exception.Message)"
          }

          if ($AuthRes) {
            $Token = @(
              $AuthRes.access_token,
              $AuthRes.token,
              $AuthRes.response.access_token,
              $AuthRes.response.token,
              $AuthRes.data.access_token,
              $AuthRes.data.token
            ) | Where-Object { $_ } | Select-Object -First 1

            $AccId = @(
              $AuthRes.account_id,
              $AuthRes.acc_id,
              $AuthRes.user_id,
              $AuthRes.response.account_id,
              $AuthRes.response.acc_id,
              $AuthRes.response.user_id,
              $AuthRes.data.account_id,
              $AuthRes.data.acc_id,
              $AuthRes.data.user_id
            ) | Where-Object { $_ } | Select-Object -First 1
          }

          # Fallback auth via curl in case PowerShell parsing/shape differs.
          if (-not $Token -or -not $AccId) {
            Write-Host "Primary auth parse failed; trying curl auth fallback..."
            $authRaw = curl.exe -sS -X POST "https://www.udrop.com/api/v2/authorize" -d "key1=$k1&key2=$k2"
            if ($LASTEXITCODE -eq 0 -and $authRaw) {
              try {
                $authJson = $authRaw | ConvertFrom-Json
                $Token = @(
                  $authJson.access_token,
                  $authJson.token,
                  $authJson.response.access_token,
                  $authJson.response.token,
                  $authJson.data.access_token,
                  $authJson.data.token
                ) | Where-Object { $_ } | Select-Object -First 1
                $AccId = @(
                  $authJson.account_id,
                  $authJson.acc_id,
                  $authJson.user_id,
                  $authJson.response.account_id,
                  $authJson.response.acc_id,
                  $authJson.response.user_id,
                  $authJson.data.account_id,
                  $authJson.data.acc_id,
                  $authJson.data.user_id
                ) | Where-Object { $_ } | Select-Object -First 1
              } catch {
                Write-Host "Warning: curl auth response was not JSON."
              }
            }
          }

          if (-not $Token -or -not $AccId) {
            Write-Host "uDrop auth failed."
            if ($AuthRes) {
              Write-Host "Auth response keys: $((($AuthRes | Get-Member -MemberType NoteProperty | Select-Object -ExpandProperty Name) -join ', '))"
            }
            exit 1
          }

          # PowerShell 5.1 does not support Invoke-RestMethod -Form. Use curl.exe multipart upload.
          $uploadResult = curl.exe -sS -X POST "https://www.udrop.com/api/v2/file/upload" `
            -F "access_token=$Token" `
            -F "account_id=$AccId" `
            -F "upload_file=@$env:FILE_NAME"

          if ($LASTEXITCODE -ne 0) {
            Write-Host "Upload failed."
            exit 1
          }

          Write-Host "Upload Complete!"
          Write-Host $uploadResult

      - name: Update Memory Secret
        if: env.SKIP_UPLOAD == 'false'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "Missing GH_PAT secret. Add a fine-grained token with Secrets write access to this repo."
            exit 1
          fi
          echo "${{ env.FILE_VERSION }}" | gh secret set NIX_LAST_VERSION --repo "${{ github.repository }}" --body -
