name: Nix - Official Mirror

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  nix-sync:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Restore Memory from Hidden Branch
        shell: bash
        run: |
          git fetch origin bot-memory || true
          git checkout origin/bot-memory -- latest_version.txt || echo "none" > latest_version.txt
          echo "CURRENT_MEM=$(cat latest_version.txt)" >> $GITHUB_ENV

      - name: Fetch App via WinGet
        shell: powershell
        run: |
          $productId = "${{ secrets.PRODUCT_ID }}"
          
          # 1. Ask WinGet for the latest version info
          Write-Host "Querying Microsoft Store for ID: $productId..."
          $info = winget show --id $productId --exact --source msstore --accept-source-agreements --disable-interactivity 2>&1 | Out-String
          if ($LASTEXITCODE -ne 0) {
              Write-Host "Error: 'winget show' failed."
              Write-Host $info
              exit 1
          }
          
          # Extract the version number (robust to output formatting differences)
          $version = $null
          $versionPatterns = @(
              '(?im)^\s*Version\s*:\s*([^\r\n]+)\s*$',
              '(?im)^\s*Installer\s+Version\s*:\s*([^\r\n]+)\s*$'
          )
          foreach ($pattern in $versionPatterns) {
              if ($info -match $pattern) {
                  $version = $Matches[1].Trim()
                  break
              }
          }

          if ($version) {
              Write-Host "Latest Version found: $version"
          } else {
              Write-Host "Error: Could not find version info."
              Write-Host "Raw output:"
              Write-Host $info
              exit 1
          }

          # 2. Compare with memory
          $latestKnown = "${{ env.CURRENT_MEM }}".Trim()
          if ($version -eq $latestKnown) {
              Write-Host "App is up to date. Skipping."
              Add-Content -Path $env:GITHUB_ENV -Value "SKIP_UPLOAD=true"
          } else {
              Write-Host "New version detected ($version). Starting download..."
              
              # 3. Download the file directly from Microsoft
              # This saves the .msix/.appx to the current directory
              winget download --id $productId --exact --source msstore --accept-source-agreements --disable-interactivity --download-directory .
              if ($LASTEXITCODE -ne 0) {
                  Write-Host "Error: 'winget download' failed."
                  exit 1
              }
              
              # Find the file name (WinGet names it based on the ID/Version)
              $file = Get-ChildItem -Include *.msix, *.msixbundle, *.appxbundle -Recurse | Select-Object -First 1
              if (-not $file) {
                  Write-Host "Error: Download completed but no app package file was found."
                  exit 1
              }
              
              Add-Content -Path $env:GITHUB_ENV -Value "SKIP_UPLOAD=false"
              Add-Content -Path $env:GITHUB_ENV -Value "FILE_NAME=$($file.Name)"
              Add-Content -Path $env:GITHUB_ENV -Value "FILE_VERSION=$version"
          }

      - name: Upload to uDrop
        if: env.SKIP_UPLOAD == 'false'
        shell: powershell
        run: |
          Write-Host "Mirroring $($env:FILE_NAME) to uDrop..."
          $AuthBody = @{ key1 = "${{ secrets.UDROP_KEY1 }}"; key2 = "${{ secrets.UDROP_KEY2 }}" }
          $AuthRes = Invoke-RestMethod -Uri "https://www.udrop.com/api/v2/authorize" -Method Post -Body $AuthBody
          
          $Token = if ($AuthRes.access_token) { $AuthRes.access_token } else { $AuthRes.response.access_token }
          $AccId = if ($AuthRes.account_id) { $AuthRes.account_id } else { $AuthRes.response.account_id }
          
          $Form = @{ access_token = $Token; account_id = $AccId; upload_file = Get-Item -Path $env:FILE_NAME }
          $UploadRes = Invoke-RestMethod -Uri "https://www.udrop.com/api/v2/file/upload" -Method Post -Form $Form
          Write-Host "Upload Complete!"

      - name: Update Memory Branch
        if: env.SKIP_UPLOAD == 'false'
        shell: bash
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan bot-memory || git checkout bot-memory
          git rm -rf . || true
          echo "${{ env.FILE_VERSION }}" > latest_version.txt
          git add latest_version.txt
          git commit -m "Nix Sync: ${{ env.FILE_VERSION }}"
          git push origin bot-memory --force
